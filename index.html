<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERC20 Balance</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      max-width: 400px;
      margin: 80px auto;
      padding: 0 1rem;
    }

    button {
      padding: 8px 16px;
      font-size: 1rem;
      cursor: pointer;
    }

    #result {
      margin-top: 1rem;
      font-size: 1.1rem;
    }

    #status {
      margin-top: 0.5rem;
      color: gray;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <h2>ERC20 Token Balance</h2>
  <button id="btn" onclick="fetchBalance()">Get Balance</button>
  <div id="result"></div>
  <div id="status"></div>

  <script>
    const SEPOLIA_CHAIN_ID = 11155111n;

    // Replace with your deployed ERC20 contract address
    const CONTRACT_ADDRESS = '0xd860D516A183a508e98a174b5632bEd77234C1f1';

    // Minimal ABI — only the functions we need
    const ABI = [
      'function balanceOf(address owner) view returns (uint256)',
      'function decimals() view returns (uint8)',
      'function symbol() view returns (string)'
    ];

    async function fetchBalance() {
      const btn    = document.getElementById('btn');
      const result = document.getElementById('result');
      const status = document.getElementById('status');

      if (!window.ethereum) {
        status.textContent = 'MetaMask not found. Please install MetaMask.';
        return;
      }

      btn.disabled = true;
      result.textContent = '';
      status.textContent = 'Connecting…';

      try {
        const provider = new ethers.BrowserProvider(window.ethereum);
        await provider.send('eth_requestAccounts', []);

        // Switch to Sepolia if needed
        const network = await provider.getNetwork();
        if (network.chainId !== SEPOLIA_CHAIN_ID) {
          status.textContent = 'Switching to Sepolia…';
          try {
            await provider.send('wallet_switchEthereumChain', [{ chainId: '0xaa36a7' }]);
          } catch (e) {
            if (e.code === 4902 || e?.error?.code === 4902) {
              await provider.send('wallet_addEthereumChain', [{
                chainId: '0xaa36a7',
                chainName: 'Sepolia Testnet',
                nativeCurrency: { name: 'Sepolia ETH', symbol: 'ETH', decimals: 18 },
                rpcUrls: ['https://rpc.sepolia.org'],
                blockExplorerUrls: ['https://sepolia.etherscan.io']
              }]);
            } else {
              throw e;
            }
          }
        }

        // Get the currently selected account
        const signer  = await provider.getSigner();
        const account = await signer.getAddress();

        status.textContent = 'Calling balanceOf…';

        // Call balanceOf() on the ERC20 contract
        const contract  = new ethers.Contract(CONTRACT_ADDRESS, ABI, provider);
        const [rawBalance, decimals, symbol] = await Promise.all([
          contract.balanceOf(account),
          contract.decimals(),
          contract.symbol()
        ]);

        const balance = ethers.formatUnits(rawBalance, decimals);

        result.textContent = `Balance: ${balance} ${symbol}`;
        status.textContent = `Account: ${account}`;

      } catch (err) {
        const msg = err?.info?.error?.message || err?.message || 'Unknown error';
        status.textContent = 'Error: ' + msg;
      } finally {
        btn.disabled = false;
      }
    }
  </script>

</body>
</html>
