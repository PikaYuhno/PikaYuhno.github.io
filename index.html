<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sepolia Block Height</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      max-width: 400px;
      margin: 80px auto;
      padding: 0 1rem;
    }

    button {
      padding: 8px 16px;
      font-size: 1rem;
      cursor: pointer;
    }

    #result {
      margin-top: 1rem;
      font-size: 1.1rem;
    }

    #status {
      margin-top: 0.5rem;
      color: gray;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <h2>Sepolia Block Height</h2>
  <button id="btn" onclick="fetchBlock()">Get Block Height</button>
  <div id="result"></div>
  <div id="status"></div>

  <script>
    const SEPOLIA_CHAIN_ID = 11155111n;

    async function fetchBlock() {
      const btn    = document.getElementById('btn');
      const result = document.getElementById('result');
      const status = document.getElementById('status');

      if (!window.ethereum) {
        status.textContent = 'MetaMask not found. Please install MetaMask.';
        return;
      }

      btn.disabled = true;
      status.textContent = 'Connecting…';
      result.textContent = '';

      try {
        const provider = new ethers.BrowserProvider(window.ethereum);
        await provider.send('eth_requestAccounts', []);

        // Switch to Sepolia if needed
        const network = await provider.getNetwork();
        if (network.chainId !== SEPOLIA_CHAIN_ID) {
          status.textContent = 'Switching to Sepolia…';
          try {
            await provider.send('wallet_switchEthereumChain', [{ chainId: '0xaa36a7' }]);
          } catch (e) {
            if (e.code === 4902 || e?.error?.code === 4902) {
              await provider.send('wallet_addEthereumChain', [{
                chainId: '0xaa36a7',
                chainName: 'Sepolia Testnet',
                nativeCurrency: { name: 'Sepolia ETH', symbol: 'ETH', decimals: 18 },
                rpcUrls: ['https://rpc.sepolia.org'],
                blockExplorerUrls: ['https://sepolia.etherscan.io']
              }]);
            } else {
              throw e;
            }
          }
        }

        const blockNumber = await provider.getBlockNumber();
        result.textContent = 'Block height: ' + blockNumber.toLocaleString();
        status.textContent = '';

      } catch (err) {
        const msg = err?.info?.error?.message || err?.message || 'Unknown error';
        status.textContent = 'Error: ' + msg;
      } finally {
        btn.disabled = false;
      }
    }
  </script>

</body>
</html>
