<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERC20 Transfer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      max-width: 400px;
      margin: 80px auto;
      padding: 0 1rem;
    }

    button {
      padding: 8px 16px;
      font-size: 1rem;
      cursor: pointer;
    }

    #result {
      margin-top: 1rem;
      font-size: 1.1rem;
      word-break: break-all;
    }

    #status {
      margin-top: 0.5rem;
      color: gray;
      font-size: 0.9rem;
      word-break: break-all;
    }
  </style>
</head>
<body>

  <h2>ERC20 Transfer</h2>
  <p>Sends 10 tokens to <code>0x15433DA387451F9dE4565280C85506CB71aF9376</code></p>
  <br>
  <button id="btn" onclick="sendTransfer()">Transfer</button>
  <div id="result"></div>
  <div id="status"></div>

  <script>
    const SEPOLIA_CHAIN_ID = 11155111n;
    const CONTRACT_ADDRESS = '0xd860D516A183a508e98a174b5632bEd77234C1f1';
    const RECIPIENT        = '0x15433DA387451F9dE4565280C85506CB71aF9376';
    const AMOUNT           = 10;

    const ABI = [
      'function transfer(address to, uint256 amount) returns (bool)',
      'function decimals() view returns (uint8)'
    ];

    async function sendTransfer() {
      const btn    = document.getElementById('btn');
      const result = document.getElementById('result');
      const status = document.getElementById('status');

      if (!window.ethereum) {
        status.textContent = 'MetaMask not found. Please install MetaMask.';
        return;
      }

      btn.disabled = true;
      result.textContent = '';
      status.textContent = 'Connecting…';

      try {
        const provider = new ethers.BrowserProvider(window.ethereum);
        await provider.send('eth_requestAccounts', []);

        // Switch to Sepolia if needed
        const network = await provider.getNetwork();
        if (network.chainId !== SEPOLIA_CHAIN_ID) {
          status.textContent = 'Switching to Sepolia…';
          try {
            await provider.send('wallet_switchEthereumChain', [{ chainId: '0xaa36a7' }]);
          } catch (e) {
            if (e.code === 4902 || e?.error?.code === 4902) {
              await provider.send('wallet_addEthereumChain', [{
                chainId: '0xaa36a7',
                chainName: 'Sepolia Testnet',
                nativeCurrency: { name: 'Sepolia ETH', symbol: 'ETH', decimals: 18 },
                rpcUrls: ['https://rpc.sepolia.org'],
                blockExplorerUrls: ['https://sepolia.etherscan.io']
              }]);
            } else {
              throw e;
            }
          }
        }

        const signer   = await provider.getSigner();
        const contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);

        // Scale the amount by the token's decimals
        const decimals     = await contract.decimals();
        const scaledAmount = ethers.parseUnits(AMOUNT.toString(), decimals);

        status.textContent = 'Waiting for MetaMask confirmation…';

        const tx = await contract.transfer(RECIPIENT, scaledAmount);

        status.textContent = 'Transaction submitted. Waiting for confirmation…';
        result.textContent = 'Tx hash: ' + tx.hash;

        await tx.wait();

        status.textContent = 'Transfer confirmed!';

      } catch (err) {
        const msg = err?.info?.error?.message || err?.message || 'Unknown error';
        status.textContent = 'Error: ' + msg;
      } finally {
        btn.disabled = false;
      }
    }
  </script>

</body>
</html>
